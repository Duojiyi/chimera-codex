name: PR build artifacts

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: Branding / ads / Rust / frontend
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/codex-plus-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Branding generate check
        shell: pwsh
        run: pwsh -File scripts/generate-branding.ps1 -Check

      - name: Verify no upstream ads
        shell: pwsh
        run: pwsh -File scripts/verify-no-upstream-ads.ps1

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm ci

      - name: TypeScript check
        working-directory: apps/codex-plus-manager
        run: npm run check

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Rust tests
        run: cargo test --workspace

  resolve-version:
    name: Resolve Cargo version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Cargo workspace version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          version="$(
            awk '
              /^\[workspace\.package\]/ { in_pkg=1; next }
              /^\[/ { in_pkg=0 }
              in_pkg && /^version[[:space:]]*=/ {
                if (match($0, /"[^"]+"/)) {
                  print substr($0, RSTART+1, RLENGTH-2)
                  exit
                }
              }
            ' Cargo.toml
          )"
          if [[ -z "$version" ]]; then
            echo "error: failed to read [workspace.package].version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved Cargo version: ${version}"

  windows-artifacts:
    name: Windows artifacts
    needs:
      - gates
      - resolve-version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/codex-plus-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm ci

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build release binaries
        run: cargo build --release

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/codex-plus-plus.exe dist/windows/app/
          Copy-Item target/release/codex-plus-plus-manager.exe dist/windows/app/

      - name: Build Windows zip and installer
        shell: pwsh
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          $version = $env:VERSION
          if (-not $version) { throw "VERSION is empty" }
          New-Item -ItemType Directory -Force dist/windows | Out-Null
          Compress-Archive -Path dist/windows/app/* -DestinationPath "dist/windows/ChimeraCodex-$version-windows-x64.zip" -Force

          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" CodexPlusPlus.nsi
          Pop-Location

          $setup = "dist/windows/ChimeraCodex-$version-windows-x64-setup.exe"
          $zip = "dist/windows/ChimeraCodex-$version-windows-x64.zip"
          if (-not (Test-Path $setup)) { throw "missing $setup" }
          if (-not (Test-Path $zip)) { throw "missing $zip" }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chimera-codex-windows-x64
          path: |
            dist/windows/ChimeraCodex-*-windows-x64-setup.exe
            dist/windows/ChimeraCodex-*-windows-x64.zip
          if-no-files-found: error

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    needs:
      - gates
      - resolve-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            lipo_arch: x86_64
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
            lipo_arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/codex-plus-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm ci

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build macOS DMG and zip
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail
          VERSION="${VERSION:?}"
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"
          mkdir -p "dist/macos/app-${{ matrix.arch }}"
          cp "target/${{ matrix.target }}/release/codex-plus-plus" "dist/macos/app-${{ matrix.arch }}/"
          cp "target/${{ matrix.target }}/release/codex-plus-plus-manager" "dist/macos/app-${{ matrix.arch }}/"
          (cd dist/macos && zip -r "ChimeraCodex-${VERSION}-macos-${{ matrix.arch }}.zip" "app-${{ matrix.arch }}")
          test -f "dist/macos/ChimeraCodex-${VERSION}-macos-${{ matrix.arch }}.dmg"
          test -f "dist/macos/ChimeraCodex-${VERSION}-macos-${{ matrix.arch }}.zip"

      - name: Verify macOS bundle structure
        run: |
          set -euo pipefail
          expected_arch="${{ matrix.lipo_arch }}"
          test -L "dist/macos/stage/Applications"
          test "$(readlink "dist/macos/stage/Applications")" = "/Applications"
          for app in "dist/macos/stage/Chimera Codex.app" "dist/macos/stage/Chimera Codex 管理工具.app"; do
            test -f "$app/Contents/Info.plist"
            test -f "$app/Contents/PkgInfo"
            exe_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            exe_path="$app/Contents/MacOS/$exe_name"
            test -x "$exe_path"
            short_ver="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")"
            build_ver="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app/Contents/Info.plist")"
            case "$short_ver" in *-*) echo "error: CFBundleShortVersionString must be X.Y.Z, got $short_ver" >&2; exit 1 ;; esac
            case "$build_ver" in ''|*[!0-9]*|0*) echo "error: CFBundleVersion must be positive integer, got $build_ver" >&2; exit 1 ;; esac
            plutil -lint "$app/Contents/Info.plist" >/dev/null
            archs="$(lipo -archs "$exe_path")"
            case " $archs " in
              *" $expected_arch "*) ;;
              *) echo "error: expected arch $expected_arch in '$archs' for $exe_path" >&2; exit 1 ;;
            esac
            codesign -dv "$app" >/dev/null 2>&1
            echo "verified (ad-hoc only, not notarized): $app arch=$archs"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chimera-codex-macos-${{ matrix.arch }}
          path: |
            dist/macos/ChimeraCodex-*-macos-${{ matrix.arch }}.dmg
            dist/macos/ChimeraCodex-*-macos-${{ matrix.arch }}.zip
          if-no-files-found: error
